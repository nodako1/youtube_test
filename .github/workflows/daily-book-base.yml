name: Daily Book Base Automation

on:
  schedule:
    - cron: "0 22 * * *" # 07:00 JST
  workflow_dispatch:
    inputs:
      generate_images:
        description: "Generate scene images with OpenAI Image API"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      image_scenes:
        description: "Scenes to generate images for, e.g. 1-20 or 17,18,19,20"
        required: false
        default: "1-20"
      force_images:
        description: "Force regenerate existing images"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

concurrency:
  group: daily-book-base-automation
  cancel-in-progress: false

jobs:
  generate:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .[ai]
      - name: Require OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required for production runs." >&2
            exit 1
          fi
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Define git retry helpers
        run: |
          cat > /tmp/bookbase_git_helpers.sh <<'EOF'
          set -euo pipefail
          commit_and_push_if_changed() {
            local message="$1"
            git status --short
            if git diff --cached --quiet && git diff --quiet; then
              echo "No changes to commit."
              return 0
            fi
            git commit -m "$message" || true
            for attempt in 1 2 3 4 5; do
              git pull --rebase
              if git push; then
                return 0
              fi
              echo "git push failed; retry ${attempt}/5" >&2
              sleep $((attempt * 5))
            done
            echo "git push failed after retries; artifacts will be uploaded by the always() step." >&2
            return 1
          }
          EOF
      - name: Generate text assets and image prompts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          source /tmp/bookbase_git_helpers.sh
          python -m bookbase_automation.cli --root . --use-ai --generate-assets-only
          git add input processing output archive error
          commit_and_push_if_changed "Add generated Book Base text assets and image prompts"
      - name: Find latest output directory
        id: output
        run: |
          OUTPUT_DIR=$(find output -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)
          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
      - name: Generate scene images with per-scene commits
        if: ${{ github.event_name == 'schedule' || inputs.generate_images == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_SCENES: ${{ github.event_name == 'schedule' && '1-20' || inputs.image_scenes }}
          FORCE_IMAGES: ${{ github.event_name == 'schedule' && 'false' || inputs.force_images }}
          OUTPUT_DIR: ${{ steps.output.outputs.output_dir }}
        run: |
          if [ -z "$OUTPUT_DIR" ]; then
            echo "No output directory found." >&2
            exit 1
          fi
          if echo "$IMAGE_SCENES" | grep -Eq '^[0-9]+-[0-9]+$'; then
            START=${IMAGE_SCENES%-*}
            END=${IMAGE_SCENES#*-}
            SCENES=$(seq "$START" "$END")
          else
            SCENES=$(echo "$IMAGE_SCENES" | tr ',' ' ')
          fi
          for SCENE in $SCENES; do
            source /tmp/bookbase_git_helpers.sh
            CMD="python -m bookbase_automation.cli --root . --generate-images-only --output-dir '$OUTPUT_DIR' --image-scenes '$SCENE' --resume-images"
            if [ "$FORCE_IMAGES" = "true" ]; then
              CMD="$CMD --force-images"
            fi
            echo "Running: $CMD"
            eval "$CMD" || true
            git add output
            commit_and_push_if_changed "Add generated Book Base image scene_${SCENE}" || true
          done
      - name: Verify generated image files
        run: python -m bookbase_automation.cli --root . --verify-images || true
      - name: Upload partial artifacts on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-bookbase-output
          path: |
            output
            error
            processing
