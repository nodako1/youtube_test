name: Daily Book Base Automation

on:
  schedule:
    - cron: "0 22 * * *" # 07:00 JST
  workflow_dispatch:
    inputs:
      generate_images:
        description: "Generate scene images with OpenAI Image API"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      image_scenes:
        description: "Scenes to generate images for, e.g. 1-20 or 17,18,19,20"
        required: false
        default: "1-20"
      force_images:
        description: "Force regenerate existing images"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: daily-book-base-automation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .[ai]
      - name: Require OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required for production runs." >&2
            exit 1
          fi
      - name: Generate assets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GENERATE_IMAGES: ${{ github.event_name == 'schedule' && 'true' || inputs.generate_images }}
          IMAGE_SCENES: ${{ github.event_name == 'schedule' && '1-20' || inputs.image_scenes }}
          FORCE_IMAGES: ${{ github.event_name == 'schedule' && 'false' || inputs.force_images }}
        run: |
          CMD="python -m bookbase_automation.cli --root . --use-ai"

          if [ "$GENERATE_IMAGES" = "true" ]; then
            CMD="$CMD --generate-images --image-scenes $IMAGE_SCENES"
          fi

          if [ "$FORCE_IMAGES" = "true" ]; then
            CMD="$CMD --force-images"
          fi

          echo "Running: $CMD"
          eval "$CMD"
      - name: Verify generated image files
        run: |
          python -m bookbase_automation.cli --root . --verify-images || true
      - name: Commit generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add input processing output archive error
            git commit -m "Add generated Book Base assets"
            git push
          else
            echo "No generated changes."
          fi
