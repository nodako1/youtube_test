name: Daily Book Base Automation

on:
  schedule:
    - cron: "0 22 * * *" # 07:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .[ai]
      - name: Require OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required for production runs." >&2
            exit 1
          fi
      - name: Generate assets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m bookbase_automation.cli --root . --use-ai
      - name: Commit generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add input processing output archive error
            git commit -m "Add generated Book Base assets"
            git push
          else
            echo "No generated changes."
          fi
